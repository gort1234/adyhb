<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>adyhb</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Infinite dotted background -->
  <canvas id="grid-canvas"></canvas>

  <!-- Cursor-following ambient glow -->
  <div id="cursor-glow" aria-hidden="true"></div>

  <!-- World space: sticky notes live here, transformed to match the camera -->
  <div id="world-layer"></div>

  <!-- Vignette: darkens and softens the far edges of the viewport -->
  <div id="vignette" aria-hidden="true"></div>

  <!-- Top-left brand -->
  <header class="ui-topleft">
    <span class="brand">adyhb</span>
  </header>

  <!-- Top-right controls -->
  <div class="ui-topright">
    <!-- Ambient sound placeholder: no audio is implemented yet, but the
         toggle and its wired-up state give a future Ambient module a home. -->
    <button id="ambient-toggle-btn" class="icon-btn" type="button" aria-pressed="false" title="Ambient sound (coming soon)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6h4l5 5V4L8 9H4z"></path>
        <path id="ambient-wave" d="M16.5 8.5a5 5 0 0 1 0 7" opacity="0.55"></path>
      </svg>
    </button>
    <button id="help-btn" class="icon-btn" type="button" aria-haspopup="dialog" aria-controls="help-modal" title="Help">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M9.5 9.2a2.5 2.5 0 0 1 4.86.85c0 1.65-2.36 2-2.36 3.45"></path>
        <circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none"></circle>
      </svg>
    </button>
  </div>

  <!-- Bottom-left coordinates -->
  <div class="ui-bottomleft">
    <span id="coords-display" class="coords">0, 0</span>
  </div>

  <!-- Bottom-right reset view -->
  <div class="ui-bottomright">
    <button id="reset-view-btn" class="btn btn-ghost btn-small" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 3-6.7"></path>
        <path d="M3 4v5h5"></path>
      </svg>
      Reset view
    </button>
  </div>

  <!-- Sticky note modal: create + view share one dialog -->
  <div id="note-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="note-modal-heading">
      <button class="modal-close" id="note-modal-close" type="button" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>

      <!-- Create mode -->
      <form id="note-form" class="note-form">
        <h2 class="modal-heading" id="note-modal-heading">Leave a note</h2>

        <div class="field">
          <label class="field-label" for="note-title-input">Title <span class="field-optional">optional</span></label>
          <input type="text" id="note-title-input" maxlength="40" placeholder="A little heading&hellip;" autocomplete="off">
        </div>

        <div class="field">
          <label class="field-label" for="note-message-input">Message</label>
          <textarea id="note-message-input" maxlength="280" rows="4" required placeholder="Say something nice&hellip;"></textarea>
        </div>

        <div class="field">
          <span class="field-label">Paper color</span>
          <div class="color-swatches" id="color-swatches" role="radiogroup" aria-label="Paper color"></div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="note-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary">Pin note</button>
        </div>
      </form>

      <!-- View mode -->
      <div id="note-view" class="note-view" hidden>
        <h2 class="modal-heading" id="note-view-title"></h2>
        <p class="note-view-message" id="note-view-message"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-primary" id="note-view-close-btn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Help modal -->
  <div id="help-modal" class="modal-overlay" hidden>
    <div class="modal modal-help" role="dialog" aria-modal="true" aria-labelledby="help-modal-heading">
      <button class="modal-close" id="help-modal-close" type="button" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <h2 class="modal-heading" id="help-modal-heading">How adyhb works</h2>
      <ul class="help-list">
        <li>
          <span class="help-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l-3 3 3 3M16 9l3 3-3 3M13 5l-2 14"/></svg>
          </span>
          <span><strong>Drag</strong> anywhere to move around the space.</span>
        </li>
        <li>
          <span class="help-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>
          </span>
          <span><strong>Scroll</strong> to zoom in and out.</span>
        </li>
        <li>
          <span class="help-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l7 16 2-7 7-2z"/></svg>
          </span>
          <span><strong>Click</strong> an empty spot to leave a note there.</span>
        </li>
      </ul>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
